<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Intent Athletics</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">Intent Athletics</div>
    <div class="login-sub">Admin Portal</div>
    <h2>Sign in</h2>
    <p>Enter your admin email and password.</p>
    <div class="login-group">
      <label>Email</label>
      <input type="email" id="admin-email" placeholder="john@intentathletics.com" autocomplete="email">
    </div>
    <div class="login-group">
      <label>Password</label>
      <input type="password" id="admin-pass" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">Sign in</button>
    <div class="login-error" id="login-error">Incorrect password.</div>
  </div>
</div>

<div class="admin-wrap" id="admin-wrap" style="display:none;">
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">Intent Athletics</div>
      <div class="sidebar-sub">Admin</div>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">Manage</div>
      <button class="sidebar-btn active" data-section="merch">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Merch
      </button>
      <button class="sidebar-btn" data-section="clients">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clients
      </button>
      <button class="sidebar-btn" data-section="training">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        Training
      </button>
      <button class="sidebar-btn" data-section="bio">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Bio
      </button>
      <div class="sidebar-section-label" style="margin-top:1rem;">Site</div>
      <button class="sidebar-btn" data-section="settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
    <div class="sidebar-footer">
      <a href="index.html" target="_blank">↗ View website</a>
      <button id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="main-area">
    <div class="editor-panel">
      <div class="editor-header">
        <span class="editor-title" id="editor-title">Merch items</span>
        <button class="add-btn" id="add-btn" style="width:auto;padding:6px 16px;font-size:12px;border-radius:99px;">+ Add</button>
      </div>
      <div class="editor-body" id="editor-body"></div>
    </div>
    <div class="preview-panel">
      <div class="preview-header">
        <span class="preview-label">Live preview</span>
      </div>
      <div class="preview-body" id="preview-body"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
