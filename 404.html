<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Intent Athletics</title>
  <link rel="icon" href="images/favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .not-found {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      background: var(--off);
    }
    .not-found-num {
      font-family: var(--font-display);
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 400;
      color: var(--border);
      line-height: 1;
      margin-bottom: 0;
    }
    .not-found h1 {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 0.8rem;
    }
    .not-found h1 em { font-style: italic; color: var(--ink-3); }
    .not-found p {
      font-size: 15px;
      color: var(--ink-3);
      margin-bottom: 2rem;
      font-weight: 300;
      max-width: 360px;
    }
    .not-found-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="not-found">
  <div class="not-found-num">404</div>
  <h1>Page <em>not found.</em></h1>
  <p>This page doesn't exist or was moved. Head back to the homepage or find what you're looking for below.</p>
  <div class="not-found-links">
    <a href="index.html" class="btn btn-primary">Go home</a>
    <a href="training.html" class="btn btn-outline">Training</a>
    <a href="contact.html" class="btn btn-outline">Contact</a>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="js/components.js"></script>
</body>
</html>
